# kubernetes-manifests/kong-security.yaml (Versión para Forzar Sincronización)

apiVersion: v1
kind: Secret
metadata:
  name: app-jwt-secret
type: Opaque
stringData:
  # Placeholder académico: reemplazar antes de aplicar en un entorno real.
  JWT_SECRET: "CHANGE_ME_WITH_APP_JWT_SECRET"
---
apiVersion: configuration.konghq.com/v1
kind: KongPlugin
metadata:
  name: jwt-validation-plugin
plugin: jwt
config:
  # Le decimos que busque la identidad en el campo 'sub' del token.
  key_claim_name: "sub"
---
apiVersion: configuration.konghq.com/v1
kind: KongConsumer
metadata:
  name: mobile-app-consumer
username: mobile-app-consumer
---
apiVersion: v1
kind: Secret
metadata:
  name: mobile-app-consumer-jwt-credential
  annotations:
    konghq.com/consumer: mobile-app-consumer
    konghq.com/credential-type: jwt
type: Opaque
stringData:
  # La 'key' que coincide con el 'sub' del token de Ana Torres.
  key: "e12345"
  # Placeholder académico: reemplazar por el mismo valor de app-jwt-secret/JWT_SECRET antes de aplicar.
  secret: "CHANGE_ME_WITH_APP_JWT_SECRET"
